user nginx;
worker_processes auto;
pid /run/nginx.pid;

events {
    worker_connections 768;
}

http {
    sendfile on;
    tcp_nopush on;
    types_hash_max_size 2048;

    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;

    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log;

    gzip on;

    # Reject requests with no matching server block
    server {
        listen 80 default_server;
        return 444;
    }

    # HTTP → HTTPS redirect
    server {
        listen 80;
        server_name brintontech.com www.brintontech.com;
        return 301 https://$host$request_uri;
    }

    # Main HTTPS server
    server {
        listen 443 ssl;
        server_name brintontech.com www.brintontech.com;

        ssl_certificate /etc/letsencrypt/live/brintontech.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/brintontech.com/privkey.pem;
        include /etc/letsencrypt/options-ssl-nginx.conf;
        ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

        client_max_body_size 4G;
        keepalive_timeout 5;

        root /public;

        location / {
            try_files $uri @proxy_to_app;
        }

        location @proxy_to_app {
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Host $http_host;
            proxy_redirect off;
            proxy_pass http://localhost:5050;
        }

        error_page 500 502 503 504 /500.html;
        location = /500.html {
            root /public;
        }
    }
}
